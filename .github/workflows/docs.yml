name: Docs

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'include/**'
      - 'doc/**'
      - 'examples/**'
      - 'README.md'
      - 'Doxyfile'
      - '.github/workflows/docs.yml'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    env:
      DOXYGEN_AWESOME_VERSION: v2.3.4
      # Pinned so Pages renders identically to local; Ubuntu's apt doxygen
      # lags several releases and lays out tabs/concepts differently.
      DOXYGEN_VERSION: 1.17.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install Doxygen ${{ env.DOXYGEN_VERSION }}
        run: |
          url="https://www.doxygen.nl/files/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
          curl -fsSL "$url" -o doxygen.tar.gz
          tar -xzf doxygen.tar.gz
          sudo make -C "doxygen-${DOXYGEN_VERSION}" install
          doxygen --version

      - name: Fetch Doxygen Awesome theme
        run: |
          git clone --depth 1 --branch "$DOXYGEN_AWESOME_VERSION" \
            https://github.com/jothepro/doxygen-awesome-css.git \
            build/doxygen-awesome

      - name: Generate documentation
        run: doxygen Doxyfile

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/doc/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
