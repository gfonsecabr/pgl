name: Pages

on:
  push:
    branches:
      - main
      - master
    # Rebuild the site when the docs OR the benchmark data/dashboard change.
    paths:
      - 'include/**'
      - 'doc/**'
      - 'examples/**'
      - 'Doxyfile'
      - 'tests/benchmark/history/**'
      - 'tests/benchmark/dashboard/**'
      - 'tests/benchmark/build_dashboard.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    env:
      DOXYGEN_AWESOME_VERSION: v2.3.4
      DOXYGEN_VERSION: 1.17.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reuse the previously built docs when none of their sources changed, so a
      # benchmark-only push redeploys without rebuilding the API reference.
      - name: Restore docs cache
        id: doccache
        uses: actions/cache@v4
        with:
          path: build/doc/html
          key: docs-${{ env.DOXYGEN_VERSION }}-${{ env.DOXYGEN_AWESOME_VERSION }}-${{ hashFiles('Doxyfile', 'doc/**', 'include/**', 'examples/**') }}

      - name: Install Graphviz
        if: steps.doccache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install Doxygen ${{ env.DOXYGEN_VERSION }}
        if: steps.doccache.outputs.cache-hit != 'true'
        run: |
          # GitHub release assets are CDN-backed and reliable in CI; doxygen.nl
          # rejects the runner's request with HTTP 415.
          tag="Release_$(echo "$DOXYGEN_VERSION" | tr . _)"
          url="https://github.com/doxygen/doxygen/releases/download/${tag}/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
          curl -fsSL "$url" -o doxygen.tar.gz
          tar -xzf doxygen.tar.gz
          sudo make -C "doxygen-${DOXYGEN_VERSION}" install
          doxygen --version

      - name: Fetch Doxygen Awesome theme
        if: steps.doccache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$DOXYGEN_AWESOME_VERSION" \
            https://github.com/jothepro/doxygen-awesome-css.git \
            build/doxygen-awesome

      - name: Generate documentation
        if: steps.doccache.outputs.cache-hit != 'true'
        run: doxygen Doxyfile

      # Work around a Doxygen-core bug in the bundled navtree.js resize script:
      # `barWidth` is subtracted from both the sidebar width and the persisted
      # width cookie, so the left sidebar loses `barWidth` px on every page load
      # and shrinks rapidly while the window is resized, until it collapses.
      # Neutralizing barWidth removes the drift (the resize handle, .ui-resizable-e,
      # is absolutely positioned and does not consume layout width).
      # Upstream: https://github.com/jothepro/doxygen-awesome-css/issues/170
      # NOTE: doxygen-pgl.css intentionally adds NO border/padding to #side-nav;
      # any horizontal box there would reintroduce the drift in the other direction.
      # Runs unconditionally (not just on cache miss): a cache *hit* restores a
      # previously-built, possibly-unpatched navtree.js, and the patch is idempotent.
      - name: Patch navtree.js sidebar-resize drift (Doxygen barWidth bug)
        run: |
          sed -i -E 's/(barWidth)[[:space:]]*=[[:space:]]*[0-9]+/\1=0/' build/doc/html/navtree.js
          grep -q 'barWidth=0' build/doc/html/navtree.js  # fail the build if the patch didn't apply

      - name: Assemble site (docs at root, benchmarks under /benchmarks)
        run: |
          rm -rf site
          mkdir -p site
          cp -r build/doc/html/. site/
          python3 tests/benchmark/build_dashboard.py \
            --history tests/benchmark/history \
            --dashboard tests/benchmark/dashboard \
            --bench-root tests/benchmark \
            --repo-url "https://github.com/${GITHUB_REPOSITORY}/blob/main/" \
            --out site/benchmarks

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
