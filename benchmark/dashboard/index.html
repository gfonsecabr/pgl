<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Pangolin · benchmarks</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <a href="../index.html" class="logo-link"><img src="logo.png" alt="Pangolin" class="logo"/></a>
    <a href="../index.html">Pangolin</a><span>benchmarks</span>
  </div>
  <div class="controls">
    <label class="filter-box">Filter
      <input id="filter" type="search" placeholder="regex…" autocomplete="off"
             autocapitalize="off" spellcheck="false"
             aria-label="Filter benchmarks by regular expression"/>
    </label>
    <div class="legend"><span>best</span><i class="grad"></i><span>worst</span></div>
    <label class="machine-picker">Machine
      <select id="machine"></select>
    </label>
  </div>
</header>

<div id="summary" class="summary"></div>
<main id="suites"></main>
<p id="generated" class="generated"></p>

<div id="spark-pop" role="tooltip"></div>

<dialog id="chart-dialog">
  <div class="dialog-head">
    <span id="chart-title"></span>
    <button id="chart-close" type="button" aria-label="Close">&times;</button>
  </div>
  <div class="dialog-body"><canvas id="chart-canvas"></canvas></div>
</dialog>

<script src="app.js"></script>
</body>
</html>
