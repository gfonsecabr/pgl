<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Pangolin · benchmarks</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <a href="../index.html" class="logo-link"><img src="logo.png" alt="Pangolin" class="logo"/></a>
    <a href="../index.html">Pangolin</a><span>benchmarks</span>
  </div>
  <div class="controls">
    <div class="legend"><span>best</span><i class="grad"></i><span>worst</span></div>
    <label class="machine-picker">Machine
      <select id="machine"></select>
    </label>
  </div>
</header>

<!-- One multi-select chip group per cube dimension. The two highest-priority
     dimensions that still have >1 value selected become the table columns and
     rows; any further multi-valued dimensions facet into a grid of tables. -->
<section id="filters" class="filters"></section>

<div id="summary" class="summary"></div>
<main id="suites"></main>

<section id="extra-section" class="extra-section">
  <h1 class="section-title">Whole-algorithm benchmarks</h1>
  <main id="extra"></main>
</section>

<p id="generated" class="generated"></p>

<div id="spark-pop" role="tooltip"></div>

<dialog id="chart-dialog">
  <div class="dialog-head">
    <span id="chart-title"></span>
    <button id="chart-close" type="button" aria-label="Close">&times;</button>
  </div>
  <div class="dialog-body"><canvas id="chart-canvas"></canvas></div>
</dialog>

<script src="app.js"></script>
</body>
</html>
